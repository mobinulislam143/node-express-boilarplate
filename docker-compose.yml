version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose for local development.
# Spins up the API server. Database is MongoDB Atlas (set DATABASE_URL in .env).
#
# Usage:
#   docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: enterprise_api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
