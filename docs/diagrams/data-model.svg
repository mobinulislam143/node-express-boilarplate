<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <title>Enterprise Backend Data Model</title>
  <desc>Entity relationship diagram showing User, Role, Permission, UserRole, RolePermission, and RefreshToken</desc>

  <defs>
    <marker id="tip" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
    <marker id="tipg" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="820" height="500" fill="#0f172a" rx="14"/>
  <text x="410" y="34" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="0.3">Data Model — Entity Relationships</text>

  <!-- USER -->
  <rect x="60" y="160" width="200" height="190" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="60" y="160" width="200" height="28" rx="8" fill="#1d3461"/>
  <rect x="60" y="180" width="200" height="8" fill="#1d3461"/>
  <text x="160" y="179" fill="#93c5fd" font-size="12" font-weight="700" text-anchor="middle">User</text>
  <text x="80" y="205" fill="#64748b" font-size="10">🔑 id</text>
  <text x="80" y="220" fill="#94a3b8" font-size="10">email  (unique)</text>
  <text x="80" y="235" fill="#94a3b8" font-size="10">password  (hashed)</text>
  <text x="80" y="250" fill="#94a3b8" font-size="10">firstName · lastName</text>
  <text x="80" y="265" fill="#94a3b8" font-size="10">avatar?</text>
  <text x="80" y="280" fill="#475569" font-size="10">isEmailVerified</text>
  <text x="80" y="295" fill="#475569" font-size="10">emailVerifyToken?</text>
  <text x="80" y="310" fill="#475569" font-size="10">passwordResetToken?</text>
  <text x="80" y="325" fill="#475569" font-size="10">passwordResetExpiry?</text>
  <text x="80" y="340" fill="#334155" font-size="10">createdAt · updatedAt</text>

  <!-- ROLE -->
  <rect x="310" y="100" width="200" height="140" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="310" y="100" width="200" height="28" rx="8" fill="#2d1d5e"/>
  <rect x="310" y="120" width="200" height="8" fill="#2d1d5e"/>
  <text x="410" y="119" fill="#c4b5fd" font-size="12" font-weight="700" text-anchor="middle">Role</text>
  <text x="330" y="145" fill="#64748b" font-size="10">🔑 id</text>
  <text x="330" y="160" fill="#94a3b8" font-size="10">name  (unique, lowercase)</text>
  <text x="330" y="175" fill="#94a3b8" font-size="10">description</text>
  <text x="330" y="190" fill="#334155" font-size="10">createdAt · updatedAt</text>

  <!-- PERMISSION -->
  <rect x="560" y="100" width="200" height="130" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="560" y="100" width="200" height="28" rx="8" fill="#3b2700"/>
  <rect x="560" y="120" width="200" height="8" fill="#3b2700"/>
  <text x="660" y="119" fill="#fcd34d" font-size="12" font-weight="700" text-anchor="middle">Permission</text>
  <text x="580" y="145" fill="#64748b" font-size="10">🔑 id</text>
  <text x="580" y="160" fill="#94a3b8" font-size="10">name  (resource:action)</text>
  <text x="580" y="175" fill="#94a3b8" font-size="10">description</text>
  <text x="580" y="190" fill="#334155" font-size="10">createdAt · updatedAt</text>
  <text x="580" y="212" fill="#78350f" font-size="9">e.g. users:read</text>
  <text x="580" y="224" fill="#78350f" font-size="9">     posts:create</text>

  <!-- UserRole junction -->
  <rect x="310" y="300" width="200" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="310" y="300" width="200" height="24" rx="8" fill="#052e16"/>
  <rect x="310" y="316" width="200" height="8" fill="#052e16"/>
  <text x="410" y="317" fill="#6ee7b7" font-size="11" font-weight="700" text-anchor="middle">UserRole</text>
  <text x="330" y="338" fill="#64748b" font-size="10">🔑 id</text>
  <text x="330" y="353" fill="#94a3b8" font-size="10">userId  →  User.id</text>
  <text x="330" y="368" fill="#94a3b8" font-size="10">roleId  →  Role.id</text>
  <text x="330" y="376" fill="#334155" font-size="9">  unique(userId, roleId)</text>

  <!-- RolePermission junction -->
  <rect x="560" y="280" width="200" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="560" y="280" width="200" height="24" rx="8" fill="#052e16"/>
  <rect x="560" y="296" width="200" height="8" fill="#052e16"/>
  <text x="660" y="297" fill="#6ee7b7" font-size="11" font-weight="700" text-anchor="middle">RolePermission</text>
  <text x="580" y="318" fill="#64748b" font-size="10">🔑 id</text>
  <text x="580" y="333" fill="#94a3b8" font-size="10">roleId  →  Role.id</text>
  <text x="580" y="348" fill="#94a3b8" font-size="10">permissionId  →  Permission.id</text>
  <text x="580" y="362" fill="#334155" font-size="9">  unique(roleId, permissionId)</text>

  <!-- RefreshToken -->
  <rect x="60" y="400" width="200" height="82" rx="8" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5"/>
  <rect x="60" y="400" width="200" height="24" rx="8" fill="#3b0a14"/>
  <rect x="60" y="416" width="200" height="8" fill="#3b0a14"/>
  <text x="160" y="417" fill="#fda4af" font-size="11" font-weight="700" text-anchor="middle">RefreshToken</text>
  <text x="80" y="438" fill="#64748b" font-size="10">🔑 id</text>
  <text x="80" y="452" fill="#94a3b8" font-size="10">token  (unique)</text>
  <text x="80" y="466" fill="#94a3b8" font-size="10">userId  →  User.id</text>
  <text x="80" y="478" fill="#94a3b8" font-size="10">expiresAt · createdAt</text>

  <!-- RELATIONS -->
  <line x1="260" y1="290" x2="310" y2="330" stroke="#10b981" stroke-width="1.5" marker-end="url(#tipg)"/>
  <text x="270" y="318" fill="#059669" font-size="9">1</text>
  <text x="298" y="326" fill="#059669" font-size="9">*</text>

  <line x1="410" y1="240" x2="410" y2="300" stroke="#10b981" stroke-width="1.5" marker-end="url(#tipg)"/>
  <text x="415" y="258" fill="#059669" font-size="9">1</text>
  <text x="415" y="295" fill="#059669" font-size="9">*</text>

  <line x1="510" y1="180" x2="560" y2="308" stroke="#10b981" stroke-width="1.5" marker-end="url(#tipg)"/>
  <text x="518" y="200" fill="#059669" font-size="9">1</text>
  <text x="552" y="306" fill="#059669" font-size="9">*</text>

  <line x1="660" y1="230" x2="660" y2="280" stroke="#10b981" stroke-width="1.5" marker-end="url(#tipg)"/>
  <text x="665" y="248" fill="#059669" font-size="9">1</text>
  <text x="665" y="276" fill="#059669" font-size="9">*</text>

  <line x1="160" y1="350" x2="160" y2="400" stroke="#f43f5e" stroke-width="1.5" marker-end="url(#tip)"/>
  <text x="165" y="368" fill="#f43f5e" font-size="9">1</text>
  <text x="165" y="396" fill="#f43f5e" font-size="9">*</text>
  <text x="170" y="378" fill="#ef4444" font-size="8">onDelete: Cascade</text>

  <!-- LEGEND -->
  <rect x="310" y="420" width="440" height="56" rx="6" fill="#1e293b" stroke="#1e293b"/>
  <text x="330" y="438" fill="#475569" font-size="10" font-weight="600">LEGEND</text>
  <line x1="330" y1="450" x2="356" y2="450" stroke="#10b981" stroke-width="1.5" marker-end="url(#tipg)"/>
  <text x="362" y="454" fill="#64748b" font-size="10">relationship (1 : *)</text>
  <line x1="330" y1="466" x2="356" y2="466" stroke="#f43f5e" stroke-width="1.5" marker-end="url(#tip)"/>
  <text x="362" y="470" fill="#64748b" font-size="10">cascade delete on parent removal</text>
  <text x="510" y="438" fill="#64748b" font-size="10">🔑 = MongoDB ObjectId (@db.ObjectId)</text>
  <text x="510" y="454" fill="#64748b" font-size="10">Junction tables allow future metadata</text>
  <text x="510" y="470" fill="#64748b" font-size="10">(e.g. grantedAt, grantedBy)</text>
</svg>
